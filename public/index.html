<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پارسیفای — مدیریت مالی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D14; color: #EEF; font-family: 'Vazirmatn', Tahoma, sans-serif; min-height: 100vh; }
    .nav { display: flex; gap: 0; background: rgba(255,255,255,.03); border-bottom: 1px solid rgba(255,255,255,.06); overflow-x: auto; }
    .nav-btn { flex: 1; min-width: 80px; padding: 14px 8px; background: none; border: none; color: #555; font-family: inherit; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap; }
    .nav-btn.active { color: #A5B4FC; border-bottom-color: #6366F1; }
    .page { display: none; padding: 16px; max-width: 860px; margin: 0 auto; }
    .page.active { display: block; }
    .header { text-align: center; padding: 24px 0 28px; }
    .header h1 { font-size: clamp(24px,5vw,38px); font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg,#fff,#A5B4FC,#6EE7B7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: #555; font-size: 13px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 12px; margin-bottom: 20px; }
    .stat { border-radius: 14px; padding: 16px 18px; }
    .stat-purple { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.25); }
    .stat-green { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25); }
    .stat-red { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); }
    .stat-yellow { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25); }
    .stat-label { color: #666; font-size: 11px; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 800; }
    .stat-purple .stat-value { color: #A5B4FC; }
    .stat-green .stat-value { color: #6EE7B7; }
    .stat-red .stat-value { color: #FCA5A5; }
    .stat-yellow .stat-value { color: #FCD34D; }
    .btn { border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg,#6366F1,#8B5CF6); color: white; }
    .btn-green { background: linear-gradient(135deg,#10B981,#059669); color: white; }
    .btn-red { background: linear-gradient(135deg,#EF4444,#DC2626); color: white; }
    .btn-outline { background: none; border: 1px solid rgba(255,255,255,.15); color: #EEF; }
    .form-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .form-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1/-1; }
    .form-label { color: #666; font-size: 12px; }
    .form-input { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 10px 12px; color: #EEF; font-family: inherit; font-size: 14px; }
    .form-input:focus { outline: none; border-color: rgba(99,102,241,.5); }
    select.form-input option { background: #1a1a2e; }
    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    .card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; border-right: 4px solid #6B7280; }
    .card-info { flex: 1; }
    .card-header { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
    .card-title { font-size: 15px; font-weight: 800; }
    .card-badge { border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; background: rgba(255,255,255,.05); color: #888; }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .card-field { background: rgba(255,255,255,.04); border-radius: 7px; padding: 6px 10px; }
    .field-label { color: #444; font-size: 10px; margin-bottom: 2px; }
    .field-value { color: #EEF; font-size: 13px; font-weight: 600; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .section-title { font-size: 16px; font-weight: 700; }
    .empty { text-align: center; padding: 40px 0; color: #333; }
    .month-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .month-btn { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #888; cursor: pointer; font-family: inherit; }
    .month-btn.active { background: rgba(99,102,241,.2); border-color: rgba(99,102,241,.4); color: #A5B4FC; }
    .report-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .report-label { font-size: 14px; color: #CCC; }
    .report-value { font-size: 14px; font-weight: 700; }
    .report-total { background: rgba(99,102,241,.1); border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; margin-top: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard')">📊 داشبورد</button>
  <button class="nav-btn" onclick="showPage('expenses')">💸 هزینه دستی</button>
  <button class="nav-btn" onclick="showPage('income')">💰 درآمد</button>
  <button class="nav-btn" onclick="showPage('report')">📋 گزارش</button>
</nav>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div class="header"><h1>💼 پارسیفای</h1><p>مدیریت مالی ساده</p></div>
  <div class="stats">
    <div class="stat stat-green"><div class="stat-label">درآمد این ماه</div><div class="stat-value" id="dash-income">$0</div></div>
    <div class="stat stat-red"><div class="stat-label">هزینه این ماه</div><div class="stat-value" id="dash-expense">$0</div></div>
    <div class="stat stat-purple"><div class="stat-label">مانده</div><div class="stat-value" id="dash-balance">$0</div></div>
    <div class="stat stat-yellow"><div class="stat-label">تعداد تراکنش</div><div class="stat-value" id="dash-count">0</div></div>
  </div>
  <div class="form-card"><div class="form-title">📅 ماه جاری: <span id="current-month"></span></div><div id="dash-breakdown"></div></div>
</div>

<!-- MANUAL EXPENSE -->
<div id="page-expenses" class="page">
  <div class="form-card">
    <div class="form-title">➕ افزودن هزینه دستی</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">عنوان</label><input class="form-input" id="exp-title" placeholder="مثلاً: اجاره خانه"></div>
      <div class="form-group"><label class="form-label">مبلغ ($)</label><input class="form-input" id="exp-amount" type="number" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">تاریخ</label><input class="form-input" id="exp-date" type="date"></div>
      <div class="form-group"><label class="form-label">دسته‌بندی</label><select class="form-input" id="exp-category"><option value="rent">🏠 اجاره</option><option value="food">🍔 غذا</option><option value="fuel">⛽ بنزین</option><option value="phone">📱 تلفن</option><option value="insurance">🛡️ بیمه</option><option value="other">📦 سایر</option></select></div>
      <div class="form-group full"><label class="form-label">توضیحات (اختیاری)</label><input class="form-input" id="exp-note" placeholder="..."></div>
    </div>
    <div class="form-actions"><button class="btn btn-primary" onclick="addManualExpense()">➕ ثبت هزینه</button><button class="btn btn-outline" onclick="clearExpenseForm()">پاک کردن</button></div>
  </div>
  <div id="manual-expenses-list"></div>
</div>

<!-- INCOME -->
<div id="page-income" class="page">
  <div class="form-card">
    <div class="form-title">💰 افزودن درآمد</div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">منبع درآمد</label><input class="form-input" id="inc-title" placeholder="مثلاً: حقوق"></div>
      <div class="form-group"><label class="form-label">مبلغ ($)</label><input class="form-input" id="inc-amount" type="number" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">تاریخ</label><input class="form-input" id="inc-date" type="date"></div>
      <div class="form-group full"><label class="form-label">توضیحات</label><input class="form-input" id="inc-note" placeholder="..."></div>
    </div>
    <div class="form-actions"><button class="btn btn-green" onclick="addIncome()">➕ ثبت درآمد</button><button class="btn btn-outline" onclick="clearIncomeForm()">پاک کردن</button></div>
  </div>
  <div id="income-list"></div>
</div>

<!-- REPORT -->
<div id="page-report" class="page">
  <div class="header"><h1>📋 گزارش مالی</h1><p>خلاصه برای بودجه</p></div>
  <div class="month-filter" id="month-filter"></div>
  <div id="report-content"></div>
</div>

<script>
// داده‌ها
let manualExpenses = JSON.parse(localStorage.getItem('manualExpenses') || '[]');
let incomes = JSON.parse(localStorage.getItem('incomes') || '[]');

const CAT_LABELS = { fuel:"⛽ بنزین", insurance:"🛡️ بیمه", phone:"📱 تلفن", rent:"🏠 اجاره", food:"🍔 غذا", other:"📦 سایر" };
const CAT_COLORS = { fuel:"#F97316", insurance:"#8B5CF6", phone:"#06B6D4", rent:"#8B5CF6", food:"#F59E0B", other:"#6B7280" };

function save() {
  localStorage.setItem('manualExpenses', JSON.stringify(manualExpenses));
  localStorage.setItem('incomes', JSON.stringify(incomes));
}

// نویگیشن
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'expenses') renderManualExpenses();
  if (name === 'income') renderIncomes();
  if (name === 'report') renderReport();
}

// تاریخ امروز
const now = new Date();
document.getElementById('current-month').textContent = now.toLocaleDateString('fa-IR', { year: 'numeric', month: 'long' });
document.getElementById('exp-date').value = now.toISOString().split('T')[0];
document.getElementById('inc-date').value = now.toISOString().split('T')[0];

// داشبورد
function renderDashboard() {
  const m = now.getMonth(), y = now.getFullYear();
  const monthExpenses = manualExpenses.filter(r => { const d = new Date(r.date); return d.getMonth()===m && d.getFullYear()===y; });
  const monthIncome = incomes.filter(r => { const d = new Date(r.date); return d.getMonth()===m && d.getFullYear()===y; });
  const totalIncome = monthIncome.reduce((s,r) => s + parseFloat(r.amount||0), 0);
  const totalExpense = monthExpenses.reduce((s,r) => s + parseFloat(r.amount||0), 0);
  const balance = totalIncome - totalExpense;
  document.getElementById('dash-income').textContent = '$' + totalIncome.toFixed(0);
  document.getElementById('dash-expense').textContent = '$' + totalExpense.toFixed(0);
  document.getElementById('dash-balance').textContent = (balance >= 0 ? '+' : '') + '$' + balance.toFixed(0);
  document.getElementById('dash-count').textContent = monthExpenses.length + monthIncome.length;

  const cats = {};
  monthExpenses.forEach(r => { const c = r.category || 'other'; cats[c] = (cats[c] || 0) + parseFloat(r.amount || 0); });
  const breakdown = document.getElementById('dash-breakdown');
  if (Object.keys(cats).length === 0) { breakdown.innerHTML = '<div style="color:#444;font-size:13px;text-align:center;padding:10px">هزینه‌ای ثبت نشده</div>'; return; }
  breakdown.innerHTML = Object.entries(cats).sort((a,b) => b[1]-a[1]).map(([cat, amt]) => `<div class="report-row"><span class="report-label">${CAT_LABELS[cat] || cat}</span><span class="report-value" style="color:${CAT_COLORS[cat]||'#EEF'}">$${amt.toFixed(2)}</span></div>`).join('');
}

// هزینه دستی
function addManualExpense() {
  const title = document.getElementById('exp-title').value.trim();
  const amount = document.getElementById('exp-amount').value;
  const date = document.getElementById('exp-date').value;
  const category = document.getElementById('exp-category').value;
  const note = document.getElementById('exp-note').value;
  if (!title || !amount || !date) { alert('لطفاً عنوان، مبلغ و تاریخ را وارد کنید'); return; }
  manualExpenses.unshift({ id: Date.now(), title, amount: parseFloat(amount).toFixed(2), date, category, note });
  save();
  renderManualExpenses();
  renderDashboard();
  clearExpenseForm();
}

function clearExpenseForm() {
  document.getElementById('exp-title').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-note').value = '';
}

function deleteExpense(id) {
  manualExpenses = manualExpenses.filter(e => e.id !== id);
  save(); renderManualExpenses(); renderDashboard();
}

function renderManualExpenses() {
  const list = document.getElementById('manual-expenses-list');
  if (manualExpenses.length === 0) { list.innerHTML = '<div class="empty">هزینه‌ای ثبت نشده</div>'; return; }
  list.innerHTML = manualExpenses.map(e => `<div class="card" style="border-right-color:${CAT_COLORS[e.category]||'#6B7280'}"><div class="card-info"><div class="card-header"><span class="card-title">${e.title}</span><span class="card-badge">${CAT_LABELS[e.category]||e.category}</span></div><div class="card-grid"><div class="card-field"><div class="field-label">تاریخ</div><div class="field-value">${e.date}</div></div><div class="card-field"><div class="field-label">مبلغ</div><div class="field-value">$${e.amount}</div></div>${e.note ? `<div class="card-field full"><div class="field-label">توضیحات</div><div class="field-value">${e.note}</div></div>` : ''}</div></div><button onclick="deleteExpense(${e.id})" style="background:none;border:none;color:#EF4444;cursor:pointer;">🗑</button></div>`).join('');
}

// درآمد
function addIncome() {
  const title = document.getElementById('inc-title').value.trim();
  const amount = document.getElementById('inc-amount').value;
  const date = document.getElementById('inc-date').value;
  const note = document.getElementById('inc-note').value;
  if (!title || !amount || !date) { alert('لطفاً منبع، مبلغ و تاریخ را وارد کنید'); return; }
  incomes.unshift({ id: Date.now(), title, amount: parseFloat(amount).toFixed(2), date, note });
  save();
  renderIncomes();
  renderDashboard();
  clearIncomeForm();
}

function clearIncomeForm() {
  document.getElementById('inc-title').value = '';
  document.getElementById('inc-amount').value = '';
  document.getElementById('inc-note').value = '';
}

function deleteIncome(id) {
  incomes = incomes.filter(e => e.id !== id);
  save(); renderIncomes(); renderDashboard();
}

function renderIncomes() {
  const list = document.getElementById('income-list');
  if (incomes.length === 0) { list.innerHTML = '<div class="empty">درآمدی ثبت نشده</div>'; return; }
  list.innerHTML = incomes.map(e => `<div class="card" style="border-right-color:#10B981"><div class="card-info"><div class="card-header"><span class="card-title">💰 ${e.title}</span></div><div class="card-grid"><div class="card-field"><div class="field-label">تاریخ</div><div class="field-value">${e.date}</div></div><div class="card-field"><div class="field-label">مبلغ</div><div class="field-value" style="color:#6EE7B7">$${e.amount}</div></div>${e.note ? `<div class="card-field full"><div class="field-label">توضیحات</div><div class="field-value">${e.note}</div></div>` : ''}</div></div><button onclick="deleteIncome(${e.id})" style="background:none;border:none;color:#EF4444;cursor:pointer;">🗑</button></div>`).join('');
}

// گزارش
function renderReport(filterMonth = null) {
  const allExpenses = manualExpenses;
  const allIncomes = incomes;
  const months = [...new Set([...allExpenses, ...allIncomes].map(r => r.date?.substring(0,7)))].filter(Boolean).sort().reverse();
  const filterDiv = document.getElementById('month-filter');
  const activeMonth = filterMonth || months[0];
  filterDiv.innerHTML = months.map(m => `<button class="month-btn ${m===activeMonth?'active':''}" onclick="renderReport('${m}')">${m}</button>`).join('') || '<div>هیچ داده‌ای موجود نیست</div>';
  const filteredExpenses = allExpenses.filter(r => r.date?.startsWith(activeMonth||''));
  const filteredIncomes = allIncomes.filter(r => r.date?.startsWith(activeMonth||''));
  const totalIncome = filteredIncomes.reduce((s,r) => s+parseFloat(r.amount||0), 0);
  const totalExpense = filteredExpenses.reduce((s,r) => s+parseFloat(r.amount||0), 0);
  const cats = {};
  filteredExpenses.forEach(r => { const c = r.category || 'other'; cats[c] = (cats[c] || 0) + parseFloat(r.amount || 0); });
  const content = document.getElementById('report-content');
  content.innerHTML = `
    <div class="stats">
      <div class="stat stat-green"><div class="stat-label">کل درآمد</div><div class="stat-value">$${totalIncome.toFixed(0)}</div></div>
      <div class="stat stat-red"><div class="stat-label">کل هزینه</div><div class="stat-value">$${totalExpense.toFixed(0)}</div></div>
      <div class="stat stat-purple"><div class="stat-label">مانده</div><div class="stat-value">$${(totalIncome-totalExpense).toFixed(0)}</div></div>
    </div>
    <div class="form-card"><div class="report-title">📊 هزینه‌ها بر اساس دسته‌بندی</div>${Object.keys(cats).length ? Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt]) => `<div class="report-row"><span class="report-label">${CAT_LABELS[cat]||cat}</span><span class="report-value" style="color:${CAT_COLORS[cat]||'#EEF'}">$${amt.toFixed(2)}</span></div>`).join('') : '<div style="color:#444;padding:10px 0">هزینه‌ای ثبت نشده</div>'}</div>
    <div class="form-card"><div class="report-title">💰 درآمدها</div>${filteredIncomes.length ? filteredIncomes.map(inc => `<div class="report-row"><span class="report-label">${inc.title}</span><span class="report-value" style="color:#6EE7B7">$${inc.amount}</span></div>`).join('') : '<div style="color:#444;padding:10px 0">درآمدی ثبت نشده</div>'}</div>
  `;
}

// شروع
renderDashboard();
</script>
</body>
</html>
